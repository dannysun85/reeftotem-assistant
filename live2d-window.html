<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live2D Pet</title>
    <script type="module" src="/src/live2d-entry.ts"></script>
    <style>
      /* 完全透明的背景 */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
        cursor: grab;
      }

      /* 确保完全透明 */
      #root {
        width: 100vw;
        height: 100vh;
        background: transparent;
        position: relative;
      }

      /* 移除所有可能的背景色和边框 */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        background-color: transparent !important;
        border: none !important;
        outline: none !important;
        box-shadow: none !important;
      }

      /* 防止出现滚动条 */
      ::-webkit-scrollbar {
        display: none;
      }

      body {
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
  </body>
</html>
