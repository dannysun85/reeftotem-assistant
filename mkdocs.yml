site_name: Reeftotem Assistant
site_description: Live2D 虚拟助手桌面应用 - 完整的语音交互和 AI 对话系统
site_author: dannysun
site_url: https://sun.github.io/reeftotem-assistant

# Repository
repo_name: sun/reeftotem-assistant
repo_url: https://github.com/sun/reeftotem-assistant
edit_uri: edit/main/docs/

# Theme
theme:
  name: material
  language: zh
  palette:
    # Light mode
    - scheme: default
      primary: pink
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: 切换到暗色模式
    # Dark mode
    - scheme: slate
      primary: pink
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: 切换到亮色模式
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.share
    - header.autohide
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github
    logo: assets/logo.svg

# Plugins
plugins:
  - search:
      separator: '[\s\-\.]+'
      min_search_length: 2
      prebuild_index: true
  - git-revision-date-localized:
      type: datetime
      timezone: Asia/Shanghai
      locale: zh
      enable_creation_date: true
  - git-committers:
      repository: sun/reeftotem-assistant
      branch: main
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
        remove_comments: true
  - redirects:
      redirect_maps:
        'old-path.md': 'new-path.md'

# Markdown Extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - meta
  - md_in_html
  - toc:
      permalink: true
      title: 目录
  - tables
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      normalize_issue_symbols: true
      repo_url_shorthand: true
      user: sun
      repo: reeftotem-assistant
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      auto_append:
        - includes/mkdocs.md
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# Navigation
nav:
  - 首页: index.md
  - 入门:
    - 快速入门: getting-started.md
    - 项目架构: architecture.md
    - 项目评估: project-evaluation.md
  - 使用指南:
    - 腾讯云语音配置: guides/tencent-cloud-voice-setup.md
    - 测试指南: guides/testing-guide.md
    - CI/CD 指南: guides/cicd-guide.md
  - 开发计划:
    - ClawX 融合总方案: development/clawx-integration-plan.md
    - 页面迁移指南: development/page-migration-guide.md
    - 数字人融合设计: development/live2d-fusion-design.md
    - AI 数字人开发计划: development/live2d-development-plan.md
    - 语音交互开发计划: development/voice-interaction-plan.md
  - 模块文档:
    - Gateway 集成: modules/gateway-integration.md
    - 知识库 & RAG: modules/knowledge-rag.md
    - 工作流引擎: modules/workflow-engine.md
    - 多渠道通信: modules/channels.md
    - 技能市场: modules/skills-system.md
    - Tauri 后端: modules/tauri-backend.md
  - 修复记录:
    - Live2D 透明度分析: fixes/live2d-transparency-analysis.md
    - Live2D 透明度实施: fixes/live2d-transparency-implementation.md
    - Tauri 通信修复: fixes/tauri-communication-fix.md
    - WebSocket ASR 迁移: fixes/websocket-asr-migration.md
    - 音频转换修复: fixes/audio-conversion-fix.md

# Extra CSS and JS
extra_css:
  - assets/extra.css
  - assets/custom.css

extra_javascript:
  - assets/extra.js
  - assets/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

# Extra data
extra:
  analytics:
    provider: google
    property: G-XXXXXXXXXX
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/sun/reeftotem-assistant
    - icon: fontawesome/brands/docker
      link: https://hub.docker.com/r/sun/reeftotem-assistant
    - icon: fontawesome/solid/paper-plane
      link: mailto:contact@example.com
  version:
    provider: mike
    default: stable
  generator: false

